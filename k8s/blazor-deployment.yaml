apiVersion: apps/v1
kind: Deployment
metadata:
  name: bento-blazor
  namespace: bento
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bento-blazor
  template:
    metadata:
      labels:
        app: bento-blazor
    spec:
      containers:
        - name: bento-blazor
          image: your-dockerhub-name/bento-blazor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: Gateway__BaseUrl
              valueFrom:
                configMapKeyRef:
                  name: bento-app-config
                  key: Gateway__BaseUrl
---
apiVersion: v1
kind: Service
metadata:
  name: bento-blazor
  namespace: bento
spec:
  selector:
    app: bento-blazor
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
