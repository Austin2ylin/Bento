apiVersion: v1
kind: ConfigMap
metadata:
  name: bento-app-config
  namespace: bento
# 課程重點：ConfigMap 只放非敏感設定。
# 密碼、API Key、含密碼的 Connection String → 改放 k8s/secret.yaml
data:
  ASPNETCORE_ENVIRONMENT: "Production"

  # RabbitMQ（guest/guest 為官方預設開發帳號，生產環境請改為 Secret）
  RabbitMq__Host: "rabbitmq"
  RabbitMq__Port: "5672"
  RabbitMq__UserName: "guest"
  RabbitMq__Password: "guest"
  RabbitMq__QueueName: "order-created"

  # MongoDB 非敏感設定
  Mongo__Database: "bento_logs"
  Mongo__OrderCollection: "order_logs"

  # CORS 允許來源
  Cors__AllowedOrigins__0: "http://localhost:3000"
  Cors__AllowedOrigins__1: "http://localhost:3001"
  Cors__AllowedOrigins__2: "http://localhost"

  # PostgreSQL 非敏感設定（供 StatefulSet 使用）
  POSTGRES_USER: "bento"
  POSTGRES_DB: "bentodb"

  # MongoDB 非敏感設定（供 StatefulSet 使用）
  MONGO_INITDB_ROOT_USERNAME: "bento"

  # RabbitMQ 非敏感設定（供 Deployment 使用）
  RABBITMQ_DEFAULT_USER: "guest"
  RABBITMQ_DEFAULT_PASS: "guest"

  # Blazor Server Gateway 位址（容器內部網路）
  Gateway__BaseUrl: "http://bento-gateway:5000/gateway"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bento-nginx-config
  namespace: bento
data:
  default.conf: |
    upstream bento_frontends {
      server bento-client:3000;
      server bento-blazor:3001;
    }

    server {
      listen 80;
      server_name _;

      location / {
        proxy_pass http://bento_frontends;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
      }
    }
