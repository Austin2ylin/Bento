apiVersion: apps/v1
kind: Deployment
metadata:
  name: bento-nginx
  namespace: bento
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bento-nginx
  template:
    metadata:
      labels:
        app: bento-nginx
    spec:
      containers:
        - name: bento-nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: bento-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: bento-nginx
  namespace: bento
spec:
  type: LoadBalancer
  selector:
    app: bento-nginx
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
