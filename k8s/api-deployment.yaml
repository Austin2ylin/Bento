apiVersion: apps/v1
kind: Deployment
metadata:
  name: bento-api
  namespace: bento
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bento-api
  template:
    metadata:
      labels:
        app: bento-api
    spec:
      containers:
        - name: bento-api
          image: your-dockerhub-name/bento-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050
          envFrom:
            - configMapRef:
                name: bento-app-config
          env:
            - name: ConnectionStrings__PostgreSql
              valueFrom:
                secretKeyRef:
                  name: bento-secret
                  key: ConnectionStrings__PostgreSql
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: bento-secret
                  key: Redis__ConnectionString
            - name: Mongo__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: bento-secret
                  key: Mongo__ConnectionString
            - name: Cache__AdminApiKey
              valueFrom:
                secretKeyRef:
                  name: bento-secret
                  key: Cache__AdminApiKey
          readinessProbe:
            httpGet:
              path: /
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5050
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bento-api
  namespace: bento
spec:
  selector:
    app: bento-api
  ports:
    - port: 5050
      targetPort: 5050
      protocol: TCP
