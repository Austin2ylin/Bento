apiVersion: apps/v1
kind: Deployment
metadata:
  name: bento-api
  namespace: bento
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bento-api
  template:
    metadata:
      labels:
        app: bento-api
    spec:
      containers:
        - name: bento-api
          image: your-dockerhub-name/bento-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050
          # 非敏感設定從 ConfigMap 整批注入
          envFrom:
            - configMapRef:
                name: bento-app-config
          # 課程重點：含密碼的 Connection String 及 API Key 從 Secret 個別注入。
          # envFrom secretRef 可整批注入 Secret，但 env + secretKeyRef 的寫法
          # 能明確列出每個敏感變數，讓讀者一眼看出哪些是敏感設定。
          env:
            - name: ConnectionStrings__PostgreSql
              valueFrom:
                secretKeyRef:
                  name: bento-secret
                  key: ConnectionStrings__PostgreSql
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: bento-secret
                  key: Redis__ConnectionString
            - name: Mongo__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: bento-secret
                  key: Mongo__ConnectionString
            - name: Cache__AdminApiKey
              valueFrom:
                secretKeyRef:
                  name: bento-secret
                  key: Cache__AdminApiKey
          readinessProbe:
            httpGet:
              path: /
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5050
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bento-api
  namespace: bento
spec:
  selector:
    app: bento-api
  ports:
    - port: 5050
      targetPort: 5050
      protocol: TCP
